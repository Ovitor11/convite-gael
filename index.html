<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convite do Gael</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section id="telaVideo" class="tela-video">
    <video id="videoAbertura" autoplay muted playsinline preload="auto">
  <source src="abertura.mp4" type="video/mp4" />
  Seu navegador não suporta vídeo.
</video>

<button id="btnSom" class="btn-som" type="button">🔊 Ativar som</button>
  </section>

  <section id="telaConvite" class="tela-convite escondido">
    <div class="convite-container">
      <img src="convite.jpeg?v=2" alt="Convite do Gael" class="imagem-convite" />

      <button class="area-botao botao-whatsapp" id="btnWhatsapp" aria-label="Confirmar presença"></button>
      <button class="area-botao botao-local" id="btnLocal" aria-label="Acessar localização"></button>
      <button class="area-botao botao-presente" id="btnPresente" aria-label="Sugestões de presente"></button>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
